<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="style.css">

    <title>Library Management System</title>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">

        <span class="navbar-brand">
            <i class="fas fa-book-open"></i>
            BookHaven
        </span>

        <div class="serach-form" id="searchForm">

            <input
                type="text"
                id="searchInput"
                placeholder="Search by book, reader..."
                aria-label="Search">

            <button type="button" id="searchBtn">
                <i class="fas fa-search"></i>
                Search
            </button>

        </div>

    </nav>

    <!-- Alert -->
    <div id="alertuser"></div>

    <div class="container">

        <!-- Welcome Card -->
        <div class="welcome-card">

            <h1>
                <i class="fas fa-landmark"></i>
                Library Desk
            </h1>

            <span class="badge-count">
                <i class="fas fa-layer-group"></i>
                <span id="bookCounter">0</span>
                Books
            </span>

        </div>

        <!-- Form -->
        <div class="form-card">

            <!-- FIXED ID -->
            <form id="mylibraryform">

                <div class="form-grid">

                    <div class="form-group">

                        <label for="User-Name">
                            <i class="fas fa-user"></i>
                            Reader
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            id="User-Name"
                            placeholder="e.g. James"
                            required>

                    </div>

                    <div class="form-group">

                        <label for="Book-Name">
                            <i class="fas fa-book"></i>
                            Book
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            id="Book-Name"
                            placeholder="e.g. Dune"
                            required>

                    </div>

                    <div class="form-group">

                        <label>
                            <i class="fas fa-tag"></i>
                            Genre
                        </label>

                        <div class="radio-group" id="bookTypeRadios">

                            <label>
                                <input
                                    type="radio"
                                    name="check-box"
                                    value="Fiction"
                                    checked>
                                Fiction
                            </label>

                            <label>
                                <input
                                    type="radio"
                                    name="check-box"
                                    value="Programming">
                                Programming
                            </label>

                            <label>
                                <input
                                    type="radio"
                                    name="check-box"
                                    value="Cooking">
                                Cooking
                            </label>

                        </div>

                    </div>

                    <div class="form-group">

                        <button type="submit" class="btn-add">
                            <i class="fas fa-plus-circle"></i>
                            Add Book
                        </button>

                    </div>

                </div>

            </form>

        </div>

        <!-- Table -->

        <div class="table-wrapper">

            <table class="table">

                <thead>

                    <tr>

                        <th>#</th>
                        <th>Date Issue</th>
                        <th>Reader</th>
                        <th>Book</th>
                        <th>Genre</th>
                        <th style="text-align:right;">Actions</th>

                    </tr>

                </thead>

                <tbody id="table-body">
                    <!-- JS -->
                </tbody>

            </table>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
